<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>精益知识有奖问答</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js">
</script>
<style>
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --success: #059669;
  --danger: #dc2626;
  --warning: #d97706;
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #1e293b;
  --text-light: #64748b;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.1);
  --radius: 14px;
  --radius-sm: 10px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
  -webkit-tap-highlight-color:transparent;
}
.app{
  width:100%;
  max-width:480px;
  min-height:90vh;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}
/* Header */
.header{
  background:linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e40af 100%);
  color:#fff;
  padding:18px 20px;
  text-align:center;
  flex-shrink:0;
}
.header .icon{font-size:36px;display:block;margin-bottom:2px;line-height:1}
.header h1{font-size:19px;font-weight:700;letter-spacing:0.5px}
.header .sub{font-size:12px;opacity:0.8;margin-top:2px;letter-spacing:1px}
/* Body */
.body{
  flex:1;
  padding:16px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:14px;
}
/* Cards */
.card{
  background:#f8fafc;
  border-radius:var(--radius-sm);
  padding:14px;
  border:1px solid var(--border);
}
.card-info{background:#fffbeb;border-color:#fde68a}
.card-ok{background:#f0fdf4;border-color:#bbf7d0}
.card-err{background:#fef2f2;border-color:#fecaca}
/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:13px 24px;border-radius:24px;font-size:15px;font-weight:600;
  border:none;cursor:pointer;letter-spacing:0.5px;transition:var(--transition);
  touch-action:manipulation;font-family:var(--font);
}
.btn:active{transform:scale(0.96)}
.btn-pri{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,0.3)}
.btn-pri:hover{background:var(--primary-dark)}
.btn-ok{background:var(--success);color:#fff}
.btn-out{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.btn-err{background:var(--danger);color:#fff}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:20px}
.btn-block{width:100%}
.btn:disabled{opacity:0.45;pointer-events:none}
/* Form */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text)}
.form-group input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;font-family:var(--font);transition:var(--transition);background:#fff;
  -webkit-appearance:none;outline:none;color:var(--text);
}
.form-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.form-group .hint{font-size:11px;color:var(--text-light);margin-top:3px}
/* Progress */
.progress-wrap{background:#e2e8f0;border-radius:8px;height:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:8px;transition:width 0.35s}
.progress-txt{font-size:11px;color:var(--text-light);text-align:right;margin-top:3px}
/* Question */
.q-card{
  background:#fff;border-radius:var(--radius-sm);padding:16px;
  border:1.5px solid var(--border);box-shadow:var(--shadow);
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-badge{
  display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;
  border-radius:12px;letter-spacing:0.5px;margin-bottom:8px;
}
.badge-a{background:#eff6ff;color:#2563eb}
.badge-b{background:#fffbeb;color:#d97706}
.badge-c{background:#f0fdf4;color:#059669}
.q-text{font-size:15px;font-weight:600;line-height:1.65;margin-bottom:12px;color:#0f172a}
.opt-list{display:flex;flex-direction:column;gap:8px}
.opt{
  display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;
  border:1.5px solid #e2e8f0;cursor:pointer;transition:var(--transition);
  background:#fafbfc;font-size:14px;user-select:none;
}
.opt:active{background:#eff6ff;border-color:#93c5fd}
.opt.sel{background:#eff6ff;border-color:#2563eb;font-weight:500}
.opt-radio{
  width:20px;height:20px;border-radius:50%;border:2px solid #cbd5e1;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:var(--transition);
}
.opt.sel .opt-radio{border-color:#2563eb;background:#2563eb}
.opt.sel .opt-radio::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}
.opt-check{
  width:20px;height:20px;border-radius:5px;border:2px solid #cbd5e1;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:var(--transition);font-size:11px;color:transparent;
}
.opt.sel .opt-check{border-color:#d97706;background:#d97706;color:#fff}
.opt-letter{font-weight:700;color:#94a3b8;min-width:20px;font-size:13px}
.opt.sel .opt-letter{color:#2563eb}
.opt-text{flex:1;line-height:1.4}
/* Nav */
.nav-row{display:flex;gap:10px;justify-content:space-between;align-items:center}
.nav-row .btn{flex:1}
/* Result */
.r-score{font-size:64px;font-weight:800;text-align:center;line-height:1;margin:8px 0}
.r-score.good{color:#059669}
.r-score.bad{color:#dc2626}
.r-icon{font-size:56px;text-align:center;display:block}
.r-detail{text-align:center;font-size:14px;color:var(--text-light);line-height:1.7}
/* Admin */
.admin-box{
  background:#fffbeb;border:2px dashed #e2d8a0;border-radius:var(--radius-sm);
  padding:14px;margin-top:6px;
}
.admin-box h3{font-size:15px;margin-bottom:8px;color:#92400e}
.tbl-wrap{overflow-x:auto;max-height:260px;overflow-y:auto;margin:8px 0}
.tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:520px}
.tbl th,.tbl td{border:1px solid #e2e8f0;padding:5px 7px;text-align:center;white-space:nowrap}
.tbl th{background:#f1f5f9;font-weight:700;font-size:10px}
.tbl .row-good{background:#f0fdf4}
.tbl .row-bad{background:#fef2f2}
/* Toast */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;padding:10px 22px;border-radius:20px;
  font-size:13px;z-index:999;opacity:0;pointer-events:none;
  transition:opacity 0.3s;font-family:var(--font);box-shadow:0 6px 20px rgba(0,0,0,0.2);
}
.toast.on{opacity:1}
.toast.warn{background:#dc2626}
.toast.ok{background:#059669}
/* Admin entry */
.adm-entry{
  position:absolute;bottom:2px;right:6px;font-size:9px;color:#cbd5e1;
  cursor:pointer;opacity:0.35;z-index:10;padding:4px;user-select:none;
}
.adm-entry:active{opacity:0.7}
/* Rules */
.rules{font-size:13px;color:var(--text-light);text-align:left;padding-left:16px;line-height:1.9}
.rules b{color:var(--text)}
/* Detail table */
.dtbl-wrap{overflow-x:auto;max-height:200px;border:1px solid #e2e8f0;border-radius:8px}
.dtbl{width:100%;border-collapse:collapse;font-size:11px;min-width:360px}
.dtbl th,.dtbl td{border:1px solid #e2e8f0;padding:5px 7px;text-align:center}
.dtbl th{background:#f1f5f9;font-weight:700;font-size:10px}
/* Utils */
.text-center{text-align:center}
.text-sm{font-size:12px}
.text-xs{font-size:11px}
.text-muted{color:var(--text-light)}
.mt-2{margin-top:8px}
.mt-3{margin-top:12px}
.gap-8{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:380px){
  .header h1{font-size:17px}
  .q-text{font-size:14px}
  .opt{font-size:13px;padding:10px 11px}
  .btn{font-size:14px;padding:11px 18px}
  .r-score{font-size:52px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <span class="icon">🏭</span>
    <h1>精益知识有奖问答</h1>
    <div class="sub">学精益 · 懂精益 · 用精益</div>
  </div>
  <div class="body" id="body"></div>
  <span class="adm-entry" id="admBtn" title="管理">⚙</span>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
// ========== CONFIG ==========
var C = {
  ADMIN_PW: 'admin888',
  PASS_SCORE: 80,
  SK_COMPLETED: 'lean2_done',
  SK_RECORDS: 'lean2_records',
  SK_FP: 'lean2_fp',
  SK_USER: 'lean2_user',

  // GitHub 同步配置（数据保存到仓库 database/ 文件夹）

  if(hn.indexOf('github.io')!==-1){
    C.GITHUB_OWNER=hn.split('.')[0];
    C.GITHUB_REPO=(pn.split('/')[1]||'').replace(/\/$/,'');
  }
})();

// ========== 题库 (250题) ==========
var SINGLE = [
  {id:'s1',q:'精益生产的核心思想是（）',o:['提高产量','消除浪费、持续改善','扩大产能','增加设备'],a:'B'},
  {id:'s2',q:'精益生产起源于（）',o:['美国福特','日本丰田','德国大众','中国海尔'],a:'B'},
  {id:'s3',q:'精益生产中"七大浪费"之首是（）',o:['等待浪费','搬运浪费','过量生产浪费','库存浪费'],a:'C'},
  {id:'s4',q:'公司推行精益提案改善的目的是（）',o:['降本增效','增加成本','浪费资源','增加不良品'],a:'A'},
  {id:'s5',q:'5S管理的第一步是（）',o:['整顿','整理','清扫','清洁'],a:'B'},

  {id:'s7',q:'自働化（Jidoka）的核心是（）',o:['设备自动运行','异常自动停机，防止不良流出','无人化生产','提高速度'],a:'B'},

  {id:'s9',q:'生产节拍（Takt Time）依据（）计算',o:['设备速度','客户需求时间','员工数量','生产计划'],a:'B'},
  {id:'s10',q:'拉动式生产的指令来自（）',o:['前工序','后工序','生产计划','仓库'],a:'B'},
  {id:'s11',q:'库存浪费被称为（）',o:['必要储备','万恶之源','流动资金','安全保障'],a:'B'},

  {id:'s13',q:'快速换模将换模作业分为（）',o:['人工与自动','内部与外部','白天与夜间','维修与操作'],a:'B'},
  {id:'s14',q:'防错装置（Poka-Yoke）的作用是（）',o:['提高效率','防止人为失误','降低成本','简化操作'],a:'B'},

  {id:'s17',q:'产线平衡的目标是消除（）',o:['不良品','工位等待与瓶颈','设备故障','物料短缺'],a:'B'},
  {id:'s18',q:'以下属于"动作浪费"的是（）',o:['等料','多余弯腰、转身','重复搬运','库存积压'],a:'B'},
  {id:'s19',q:'以下属于"等待浪费"的是（）',o:['设备故障停机待修','物料搬运距离远','过度加工','多余动作'],a:'A'},
  {id:'s20',q:'加工过剩浪费是指（）',o:['工艺要求过高','生产过多','搬运过多','等待过久'],a:'A'},
  {id:'s21',q:'目视化管理的目的是（）',o:['美观','异常一眼可见','应付检查','提高士气'],a:'B'},
  {id:'s22',q:'看板管理的作用是（）',o:['宣传','传递生产/取料指令','记录数据','标识区域'],a:'B'},
  {id:'s23',q:'全员改善的主体是（）',o:['管理人员','全体员工','技术人员','质检人员'],a:'B'},
  {id:'s24',q:'精益生产追求的是（）',o:['批量生产','单件流/小批量流','库存最大化','设备最大化'],a:'B'},

  {id:'s29',q:'5Why分析法的目的是（）',o:['找责任人','找根本原因','找借口','找方法'],a:'B'},
  {id:'s30',q:'均衡化生产的目的是（）',o:['消除波动','提高速度','增加库存','扩大批量'],a:'A'},

  {id:'s32',q:'不良品浪费不包括（）',o:['返修','报废','检验','多余搬运'],a:'D'},
  {id:'s33',q:'搬运浪费的改善方向是（）',o:['增加搬运工具','优化布局、缩短距离','增加人员','增加库存'],a:'B'},
  {id:'s34',q:'精益中"价值"由（）定义',o:['企业','客户','员工','管理者'],a:'B'},
  {id:'s35',q:'不增值的活动称为（）',o:['浪费','必要作业','核心作业','辅助作业'],a:'A'},

  {id:'s45',q:'标准作业三要素不包括（）',o:['节拍时间','作业顺序','在制品标准量','设备数量'],a:'D'},

  {id:'s47',q:'物料先进先出（FIFO）用于改善（）',o:['搬运浪费','库存/过期浪费','动作浪费','等待浪费'],a:'B'},
  {id:'s48',q:'红牌作战属于5S的（）',o:['整理','整顿','清扫','素养'],a:'A'},
  {id:'s49',q:'员工培训、遵守制度属于5S的（）',o:['清扫','清洁','素养','整顿'],a:'C'},

  {id:'s56',q:'鱼骨图主要用于（）',o:['分析原因','统计数据','制定计划','核算效率'],a:'A'},
  {id:'s57',q:'二八定律指（）',o:['80%问题来自20%原因','80%人员干20%工作','80%时间生产20%产品','80%成本来自20%浪费'],a:'A'},
  {id:'s58',q:'精益改善以（）为中心',o:['设备','现场/流程/人','产量','成本'],a:'B'},

  {id:'s60',q:'设备零故障是（）的目标',o:['5S','TPM','SMED','Poka-Yoke'],a:'B'},
  {id:'s61',q:'换模时间越短，越有利于（）',o:['增加库存','小批量生产','延长交期','减少人员'],a:'B'},

// ========== 工具函数 ==========
function shuffle(a){
  var arr=a.slice();
  var randArr;
  try{
    if(typeof crypto!=='undefined'&&crypto.getRandomValues&&typeof Uint32Array!=='undefined'){
      randArr=new Uint32Array(arr.length);
      crypto.getRandomValues(randArr);
    }
  }catch(e){}
  for(var i=arr.length-1;i>0;i--){
    var j;
    if(randArr){j=randArr[i]%(i+1)}
    else{j=Math.floor(Math.random()*(i+1))}
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
  return arr;
}
function pick(arr,n){return shuffle(arr.slice()).slice(0,Math.min(n,arr.length))}
function fmtTime(d){d=d||new Date();var p=function(x){return String(x).padStart(2,'0')};return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds())}
function genFp(){
  var parts=[navigator.userAgent||'',screen.width+'x'+screen.height,String(screen.colorDepth),Intl.DateTimeFormat().resolvedOptions().timeZone||'',navigator.language||'',navigator.hardwareConcurrency||'',navigator.platform||''];
  try{var c=document.createElement('canvas');c.width=60;c.height=20;var t=c.getContext('2d');t.textBaseline='top';t.font='14px Arial';t.fillStyle='#f60';t.fillRect(0,0,60,20);t.fillStyle='#069';t.fillText('Lean2',2,2);parts.push(c.toDataURL().slice(-80))}catch(e){parts.push('na')}
  var raw=parts.join('|||'),h=0;for(var i=0;i<raw.length;i++){h=((h<<5)-h)+raw.charCodeAt(i);h|=0}return 'fp_'+Math.abs(h).toString(36).slice(0,12)
}
function getFp(){var fp=localStorage.getItem(C.SK_FP);if(!fp){fp=genFp();try{localStorage.setItem(C.SK_FP,fp)}catch(e){}}return fp}
function isDone(){try{var fp=getFp();var done=JSON.parse(localStorage.getItem(C.SK_COMPLETED)||'[]');return done.indexOf(fp)!==-1}catch(e){return false}}
function markDone(){try{var fp=getFp();var done=JSON.parse(localStorage.getItem(C.SK_COMPLETED)||'[]');if(done.indexOf(fp)===-1){done.push(fp);localStorage.setItem(C.SK_COMPLETED,JSON.stringify(done))}}catch(e){console.error('markDone失败:',e);alert('保存答题状态失败，请检查浏览器存储空间或关闭隐私模式后重试')}}
function getRecords(){try{return JSON.parse(localStorage.getItem(C.SK_RECORDS)||'[]')}catch(e){console.error('getRecords失败:',e);return[]}}
function saveRecord(r){try{var recs=getRecords();recs.push(r);localStorage.setItem(C.SK_RECORDS,JSON.stringify(recs))}catch(e){console.error('saveRecord失败:',e);alert('保存答题记录失败！请检查浏览器存储空间是否充足，或是否开启了隐私/无痕模式。建议截图保存当前页面。')}}
function getMyRecord(){var fp=getFp();var recs=getRecords();for(var i=recs.length-1;i>=0;i--){if(recs[i].fp===fp)return recs[i]}return null}
function getUser(){try{return JSON.parse(localStorage.getItem(C.SK_USER)||'null')}catch(e){return null}}

// ========== GitHub API 同步 ==========
function getGitHubToken(){
  return C.GITHUB_TOKEN || sessionStorage.getItem('gh_token') || '';
}
// 将 GitHub API 返回的 base64（UTF-8 编码）解码为字符串
function b64Decode(b64){
  var raw=atob(b64.replace(/\s/g,''));
  try{
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i)&0xff;
    return new TextDecoder('utf-8').decode(bytes);
  }catch(e){
    return raw;
  }
}
function canSyncToGitHub(){
  return !!(getGitHubToken() && C.GITHUB_OWNER && C.GITHUB_REPO);
}
function syncToGitHub(rec, callback){
  if(!canSyncToGitHub()){
    console.log('GitHub同步未配置: 缺少TOKEN/OWNER/REPO');
    if(callback) callback(false);
    return;
  }
  var apiBase='https://api.github.com/repos/'+C.GITHUB_OWNER+'/'+C.GITHUB_REPO;
  var filePath=C.GITHUB_RESULTS_PATH;
  var headers={
    'Authorization': 'Bearer '+getGitHubToken(),
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };

  // 查询当前 results.json 是否存在
  fetch(apiBase+'/contents/'+filePath,{headers:headers})
  .then(function(resp){
    if(resp.status===404){
      // 文件不存在，创建新文件
      return {sha:null,existing:[]};
    }
    if(!resp.ok) throw new Error('GET results.json failed: '+resp.status);
    return resp.json().then(function(data){
      var content=JSON.parse(b64Decode(data.content));
      return {sha:data.sha,existing:Array.isArray(content)?content:[]};
    });
  })
  .then(function(result){
    var records=result.existing;
    // 为记录添加序号
    rec.seq=(records.length?Math.max.apply(null,records.map(function(r){return r.seq||0})):0)+1;
    rec.syncedAt=new Date().toISOString();
    // 去掉 fp 字段节省空间
    var clean={seq:rec.seq,time:rec.time,name:rec.name,eid:rec.eid,dept:rec.dept,score:rec.score,passed:rec.passed,details:rec.details,syncedAt:rec.syncedAt};
    records.push(clean);

    var content=btoa(unescape(encodeURIComponent(JSON.stringify(records,null,2))));
    var body={message:'添加答题记录 #'+rec.seq+' - '+rec.name+' '+rec.score+'分',content:content};
    if(result.sha) body.sha=result.sha;

    return fetch(apiBase+'/contents/'+filePath,{
      method:'PUT',
      headers:headers,
      body:JSON.stringify(body)
    });
  })
  .then(function(resp){
    if(!resp.ok) throw new Error('PUT results.json failed: '+resp.status);
    console.log('GitHub同步成功: 记录已写入 '+filePath);
    if(callback) callback(true);
  })
  .catch(function(e){
    console.error('GitHub同步失败:',e.message);
    if(callback) callback(false);
  });
}

// ========== 抽题 ==========
// 必考题 ID 列表
var MANDATORY_IDS = ['s101', 's102', 'j101'];

function genQuestions(){
  // 从题库中分离必考题和普通题
  var manSingle=[], restSingle=[];
  for(var i=0;i<SINGLE.length;i++){
    if(MANDATORY_IDS.indexOf(SINGLE[i].id)!==-1) manSingle.push(SINGLE[i]);
    else restSingle.push(SINGLE[i]);
  }
  var manJudge=[], restJudge=[];
  for(var i=0;i<JUDGE.length;i++){
    if(MANDATORY_IDS.indexOf(JUDGE[i].id)!==-1) manJudge.push(JUDGE[i]);
    else restJudge.push(JUDGE[i]);
  }
  // 必考题 + 随机补足
  var s=manSingle.concat(pick(restSingle,Math.max(0,C.S_CNT-manSingle.length)));
  var m=pick(MULTI,C.M_CNT);
  var j=manJudge.concat(pick(restJudge,Math.max(0,C.J_CNT-manJudge.length)));
  var all=s.concat(m).concat(j);
  return shuffle(all).map(function(q){
    var type='single';
    for(var i=0;i<MULTI.length;i++){if(MULTI[i].id===q.id){type='multiple';break}}
    if(type==='single'){for(var k=0;k<JUDGE.length;k++){if(JUDGE[k].id===q.id){type='judge';break}}}
    q.type=type;
    return q;
  });
}

function renderQuiz(data){
  var qs=data.questions, idx=data.currentIndex, ans=data.answers, user=data.user;
  var total=qs.length, q=qs[idx];
  var sel=ans[idx]||[], isLast=idx===total-1;
  var isCheck=q.type==='multiple';
  var badge=q.type==='single'?'单选题':q.type==='multiple'?'多选题':'判断题';
  var badgeCls=q.type==='single'?'badge-a':q.type==='multiple'?'badge-b':'badge-c';
  var opts=q.type==='judge'?['正确','错误']:(q.o||[]);
  var letters=q.type==='judge'?['A','B']:opts.map(function(_,i){return String.fromCharCode(65+i)});

  var optHtml='';
  opts.forEach(function(t,i){
    var l=letters[i];
    var sc=sel.indexOf(l)!==-1?' sel':'';
    var ind=isCheck?'<div class="opt-check">'+(sel.indexOf(l)!==-1?'✓':'')+'</div>':'<div class="opt-radio"></div>';
    optHtml+='<div class="opt'+sc+'" data-l="'+l+'"><span class="opt-letter">'+l+'.</span>'+ind+'<span class="opt-text">'+escHtml(t)+'</span></div>';
  });

  body.innerHTML=
    '<div class="progress-wrap"><div class="progress-fill" style="width:'+Math.round(idx/total*100)+'%"></div></div>'+
    '<p class="progress-txt">第 '+(idx+1)+'/'+total+' 题</p>'+
    '<div class="q-card">'+
      '<span class="q-badge '+badgeCls+'">'+badge+'</span>'+
      '<div class="q-text">'+(idx+1)+'. '+escHtml(q.q)+'</div>'+
      (isCheck?'<p class="text-xs" style="color:#d97706">多选：可选择多个答案</p>':'')+
      '<div class="opt-list" id="optList">'+optHtml+'</div>'+
    '</div>'+
    '<div class="nav-row">'+
      (idx===0?'<span></span>':'<button class="btn btn-out btn-sm" id="btnPrev">上一题</button>')+
      '<button class="btn btn-pri btn-sm" id="btnNext">'+(isLast?'提交答卷':'下一题')+'</button>'+
    '</div>';

  document.getElementById('optList').onclick=function(e){
    var el=e.target.closest('.opt');if(!el)return;
    var l=el.dataset.l;
    var cur=ans[idx]||[];
    if(isCheck){if(cur.indexOf(l)!==-1)cur=cur.filter(function(x){return x!==l});else{cur=cur.concat([l]);cur.sort()}}
    else cur=[l];
    ans[idx]=cur;
    document.querySelectorAll('.opt').forEach(function(o){
      var dl=o.dataset.l;var on=cur.indexOf(dl)!==-1;
      o.classList.toggle('sel',on);
      var ck=o.querySelector('.opt-check');if(ck)ck.textContent=on?'✓':'';
    });
  };
  var btnPrev=document.getElementById('btnPrev');
  if(btnPrev)btnPrev.onclick=function(){renderQuiz({questions:qs,currentIndex:idx-1,answers:ans,user:user})};
  document.getElementById('btnNext').onclick=function(){
    if((ans[idx]||[]).length===0)return toast('请选择答案','warn');
    if(isLast) submit(qs,ans,user);
    else renderQuiz({questions:qs,currentIndex:idx+1,answers:ans,user:user});
  };
}

// ========== 提交 ==========
function submit(qs,ans,user){
  var score=0,details=[];
  qs.forEach(function(q,i){
    var u=(ans[i]||[]).sort().join('');
    var ok=(q.type==='multiple'?u===q.a:u===q.a);
    if(ok)score+=10;
    details.push({qi:i+1,qt:q.q,type:q.type,ua:u||'(未作答)',ca:q.a,ok:ok});
  });
  var passed=score>=C.PASS_SCORE;
  var rec={
    id:Date.now(),time:fmtTime(),score:score,passed:passed,
    fp:getFp(),name:user.name,eid:user.eid,dept:user.dept,details:details
  };
  saveRecord(rec);markDone();
  console.log('答题记录已保存:',rec.id,'得分:',score,'记录数:',getRecords().length);
  // 同步到 GitHub 仓库 database/ 文件夹
  if(canSyncToGitHub()){
    syncToGitHub(rec, function(ok){
      if(ok) toast('数据已同步到GitHub','ok');
      else toast('GitHub同步失败，数据仅保存在本地','warn');
    });
  }
  renderResult({score:score,passed:passed,details:details,record:rec});
}

    '<div style="margin-top:10px;text-align:left">'+
      '<p style="font-weight:600;font-size:13px">答题详情</p>'+
      '<div class="dtbl-wrap"><table class="dtbl"><thead><tr><th>#</th><th>题目</th><th>你的答案</th><th>正确</th><th>结果</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '</div>'+
    '<button class="btn btn-out btn-sm mt-3" id="btnHome">返回首页</button>'+
  '</div>';
  document.getElementById('btnHome').onclick=function(){render('home')};
}

// ========== 管理面板 ==========
function renderAdmin(allData){
  // allData 为可选参数：从 GitHub 加载的合并数据
  var localRecs=getRecords();
  var disp;
  var dataSource='';
  if(allData && allData.length){
    // 合并本地与云端数据（按时间+姓名+工号去重）
    var seen={};
    var merged=[];
    allData.forEach(function(r){
      var key=r.time+'|'+r.name+'|'+r.eid;
      if(!seen[key]){seen[key]=true;merged.push(r);}
    });
    // 把本地未同步的也加入
    localRecs.forEach(function(r){
      var key=r.time+'|'+r.name+'|'+r.eid;
      if(!seen[key]){seen[key]=true;merged.push(r);}
    });
    disp=merged.sort(function(a,b){return (a.syncedAt||a.time).localeCompare(b.syncedAt||b.time)});
    disp.forEach(function(r,i){r.seq=i+1});
    dataSource='<span style="color:#059669">云端数据 + 本地 ('+disp.length+'条)</span>';
  }else{
    var sorted=localRecs.slice().sort(function(a,b){return a.id-b.id});
    disp=sorted.map(function(r,i){r.seq=i+1;return r});
    dataSource='<span style="color:#d97706">仅本地 ('+disp.length+'条)</span>';
  }

  var rows='';
  disp.forEach(function(r){
    rows+='<tr class="'+(r.passed?'row-good':'row-bad')+'"><td>'+r.seq+'</td><td>'+escHtml(r.time)+'</td><td>'+escHtml(r.name||'-')+'</td><td>'+escHtml(r.eid||'-')+'</td><td>'+escHtml(r.dept||'-')+'</td><td><b style="color:'+(r.passed?'#059669':'#dc2626')+'">'+r.score+'</b></td><td>'+(r.passed?'合格':'未达标')+'</td></tr>';
  });

  var ghStatus, ghBtnHtml='';
  if(canSyncToGitHub()){
    var src=C.GITHUB_TOKEN?'CONFIG':'运行时';
    ghStatus='<span style="color:#059669">已配置 ('+src+')</span>';
    ghBtnHtml='<button class="btn btn-pri btn-sm" id="btnSyncAll">同步全部到GitHub</button> '+
      '<button class="btn btn-out btn-sm" id="btnLoadCloud">加载云端数据</button> ';
  }else if(C.GITHUB_OWNER && C.GITHUB_REPO){
    ghStatus='<span style="color:#d97706">未配置</span>';
    ghBtnHtml='<input type="password" id="ghTokenInput" placeholder="粘贴 GitHub PAT" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;width:260px"> '+
      '<button class="btn btn-ok btn-sm" id="btnSetToken">设置Token</button> ';
  }else{
    ghStatus='<span style="color:#dc2626">无法识别仓库</span>';
  }

  body.innerHTML=
    '<div class="admin-box">'+
      '<h3>管理面板</h3>'+
      '<p class="text-sm">总记录：<b>'+disp.length+'</b> | 合格：<b>'+disp.filter(function(r){return r.passed}).length+'</b> | 数据源：'+dataSource+'</p>'+
      '<p class="text-xs" style="margin-top:4px">GitHub同步：'+ghStatus+'</p>'+
      '<div class="gap-8" style="margin:8px 0;display:flex;flex-wrap:wrap;align-items:center">'+
        '<button class="btn btn-ok btn-sm" id="btnXlsx">导出Excel</button>'+
        '<button class="btn btn-out btn-sm" id="btnJson">导出JSON</button>'+
        ghBtnHtml+
        '<button class="btn btn-err btn-sm" id="btnClear">清空本地</button>'+
        '<button class="btn btn-out btn-sm" id="btnCls">关闭</button>'+
      '</div>'+
      '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>序号</th><th>答题时间</th><th>姓名</th><th>工号</th><th>部门</th><th>得分</th><th>状态</th></tr></thead><tbody>'+(rows||'<tr><td colspan="7">暂无记录</td></tr>')+'</tbody></table></div>'+
    '</div>';

  document.getElementById('btnXlsx').onclick=function(){exportXlsx(disp)};
  document.getElementById('btnJson').onclick=function(){exportJson(disp)};
  if(canSyncToGitHub()){
    document.getElementById('btnSyncAll').onclick=function(){syncAllRecords(disp)};
    document.getElementById('btnLoadCloud').onclick=function(){loadCloudData()};
  }
  var btnSetToken=document.getElementById('btnSetToken');
  if(btnSetToken)btnSetToken.onclick=function(){
    var v=document.getElementById('ghTokenInput').value.trim();
    if(!v) return toast('请输入Token','warn');
    sessionStorage.setItem('gh_token',v);
    toast('Token已设置','ok');
    render('admin');
  };
  var inp=document.getElementById('ghTokenInput');
  if(inp)inp.onkeydown=function(e){if(e.key==='Enter')btnSetToken.click()};
  document.getElementById('btnClear').onclick=function(){
    if(confirm('确定清空本地所有记录？云端数据不受影响。建议先导出备份。')){
      localStorage.removeItem(C.SK_RECORDS);localStorage.removeItem(C.SK_COMPLETED);localStorage.removeItem(C.SK_FP);
      toast('已清空','ok');setTimeout(function(){render('admin')},400);
    }
  };
  document.getElementById('btnCls').onclick=function(){render('home')};
}

// 从 GitHub 加载云端全部数据（使用 Contents API，无缓存延迟）
function loadCloudData(){
  if(!C.GITHUB_OWNER || !C.GITHUB_REPO) return toast('无法识别仓库','warn');
  toast('正在加载云端数据...','ok');
  var apiBase='https://api.github.com/repos/'+C.GITHUB_OWNER+'/'+C.GITHUB_REPO;
  var headers={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
  var token=getGitHubToken();
  if(token) headers['Authorization']='Bearer '+token;

  fetch(apiBase+'/contents/'+C.GITHUB_RESULTS_PATH,{headers:headers})
  .then(function(resp){
    if(resp.status===404) return renderAdmin([]);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    return resp.json();
  })
  .then(function(fileData){
    var content;
    try{
      // GitHub API 返回 base64 编码的 UTF-8 内容
      content=JSON.parse(b64Decode(fileData.content));
    }catch(e){
      throw new Error('解析数据失败');
    }
    if(!Array.isArray(content)) throw new Error('数据格式异常');
    renderAdmin(content);
  })
  .catch(function(e){
    console.error('加载云端数据失败:',e);
    toast('加载云端数据失败: '+e.message,'warn');
  });
}

// 手动同步全部记录到 GitHub
function syncAllRecords(recs){
  if(!recs.length) return toast('没有可同步的记录','warn');
  if(!canSyncToGitHub()) return toast('GitHub同步未配置','warn');
  var apiBase='https://api.github.com/repos/'+C.GITHUB_OWNER+'/'+C.GITHUB_REPO;
  var filePath=C.GITHUB_RESULTS_PATH;
  var headers={
    'Authorization': 'Bearer '+getGitHubToken(),
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };
  // 构建同步数据
  var records=recs.map(function(r,i){
    return {seq:i+1,time:r.time,name:r.name,eid:r.eid,dept:r.dept,score:r.score,passed:r.passed,details:r.details,syncedAt:new Date().toISOString()};
  });
  // 直接 PUT（覆盖）
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(records,null,2))));
  var body={message:'批量同步答题记录 ('+records.length+'条)',content:content};
  // 先获取当前 SHA
  fetch(apiBase+'/contents/'+filePath,{headers:headers})
  .then(function(resp){
    if(resp.ok) return resp.json().then(function(d){return d.sha});
    if(resp.status===404) return null;
    throw new Error('查询失败: '+resp.status);
  })
  .then(function(sha){
    if(sha) body.sha=sha;
    return fetch(apiBase+'/contents/'+filePath,{
      method:'PUT',headers:headers,body:JSON.stringify(body)
    });
  })
  .then(function(resp){
    if(!resp.ok) throw new Error('提交失败: '+resp.status);
    toast('已同步 '+records.length+' 条记录到GitHub','ok');
  })
  .catch(function(e){
    console.error('批量同步失败:',e);
    toast('同步失败: '+e.message,'warn');
  });
}

function exportXlsx(recs){
  if(!recs.length) return toast('没有可导出的答题记录','warn');
  if(typeof XLSX==='undefined') return toast('Excel库加载失败，请检查网络连接','warn');
  var data=recs.map(function(r){
    return {
      '序号':r.seq,'答题时间':r.time,'姓名':r.name,'工号':r.eid,'部门':r.dept||'',
      '得分':r.score,'是否合格':r.passed?'合格':'未达标',
      '答题详情':(r.details||[]).map(function(d){return 'Q'+d.qi+':'+(d.ok?'对':'错')+'[答:'+d.ua+'/正:'+d.ca+']'}).join('; ')
    };
  });
  var ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=[{wch:5},{wch:20},{wch:10},{wch:12},{wch:10},{wch:6},{wch:8},{wch:60}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'答题记录');
  XLSX.writeFile(wb,'精益问答记录_'+fmtTime().replace(/:/g,'-')+'.xlsx');
  toast('Excel导出成功','ok');
}
function exportJson(recs){
  if(!recs.length) return toast('没有可导出的答题记录','warn');
  var blob=new Blob([JSON.stringify(recs,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='精益问答记录_'+fmtTime().replace(/:/g,'-')+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('JSON导出成功','ok');
}

// ========== 管理员入口 ==========
document.getElementById('admBtn').onclick=function(){
  var pw=prompt('请输入管理密码：');
  if(pw===C.ADMIN_PW)render('admin');
  else if(pw!==null)toast('密码错误','warn');
};

function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

// 启动
render('home');
})();
