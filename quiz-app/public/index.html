<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>精益知识有奖问答</title>
<link rel="stylesheet" href="/style.css">
<style>
  :root{--pri:#2563eb;--ok:#059669;--err:#dc2626;--bg:#f1f5f9;--card:#fff;--txt:#1e293b;--muted:#64748b;--radius:14px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:12px}
  .wrap{width:100%;max-width:520px;margin:0 auto}
  .card{background:var(--card);border-radius:var(--radius);padding:24px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:12px}
  .card h2{font-size:18px;margin-bottom:6px;color:var(--txt)}
  .btn{display:inline-block;padding:10px 24px;border-radius:50px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:0.2s;text-align:center}
  .btn-pri{background:var(--pri);color:#fff;width:100%;padding:14px;font-size:16px}
  .btn-pri:hover{opacity:0.9}
  .btn-ok{background:var(--ok);color:#fff}
  .btn-out{background:#fff;color:var(--pri);border:1.5px solid var(--pri)}
  .btn-sm{padding:6px 16px;font-size:13px}
  input[type=text]{width:100%;padding:12px 14px;border:1.5px solid #dce2e8;border-radius:10px;font-size:15px;outline:none;transition:0.2s}
  input[type=text]:focus{border-color:var(--pri)}
  .form-g{margin-bottom:12px}
  .form-g label{display:block;font-size:13px;font-weight:600;color:var(--txt);margin-bottom:4px}
  .progress-bar{height:4px;background:#e2e8f0;border-radius:2px;margin-bottom:8px}
  .progress-fill{height:100%;background:var(--pri);border-radius:2px;transition:0.3s}
  .progress-txt{font-size:12px;color:var(--muted);margin-bottom:16px}
  .q-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:8px}
  .badge-a{background:#dbeafe;color:#1e40af}.badge-b{background:#fef3c7;color:#92400e}.badge-c{background:#d1fae5;color:#065f46}
  .q-text{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:14px;line-height:1.5}
  .opt-list{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:0.15s;user-select:none}
  .opt.sel{border-color:var(--pri);background:#eff6ff}
  .opt-letter{width:26px;height:26px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0}
  .opt.sel .opt-letter{background:var(--pri);color:#fff}
  .opt-check{width:20px;height:20px;border-radius:4px;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .opt.sel .opt-check{border-color:var(--pri);background:var(--pri);color:#fff}
  .opt-text{font-size:14px;color:var(--txt);flex:1}
  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:999;transition:0.3s;opacity:0;pointer-events:none}
  .toast.on{opacity:1;pointer-events:auto}
  .toast.ok{background:#d1fae5;color:#065f46}.toast.warn{background:#fef3c7;color:#92400e}.toast.err{background:#fee2e2;color:#991b1b}
  .r-score{font-size:64px;font-weight:800;text-align:center;margin:8px 0}
  .r-score.good{color:var(--ok)}.r-score.bad{color:var(--err)}
  .dtbl{width:100%;border-collapse:collapse;font-size:12px}
  .dtbl td,.dtbl th{padding:6px 8px;border-bottom:1px solid #e2e8f0;text-align:center}
  .dtbl th{background:#f8fafc;font-weight:600}
  .rules{font-size:13px;color:var(--muted);padding-left:18px;line-height:1.8}
  .text-center{text-align:center}.text-muted{color:var(--muted)}.text-sm{font-size:13px}.text-xs{font-size:11px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mb-3{margin-bottom:12px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="wrap" id="app"><div class="card text-center" style="padding:40px"><p style="color:var(--muted)">加载中...</p></div></div>

<script>
var C = { S_CNT: 4, M_CNT: 2, J_CNT: 3, PASS_SCORE: 80 };

var _tt;
function toast(msg, cls) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast on ' + (cls || 'ok');
  clearTimeout(_tt); _tt = setTimeout(function() { el.className = 'toast'; }, 2200);
}

var app = document.getElementById('app');
var questions = [], answers = {};

// ====== 加载状态 ======
async function load() {
  try {
    var res = await fetch('/api/random-questions');
    var data = await res.json();
    if (data.status === 'completed') {
      showScore(data.score);
    } else if (data.status === 'pending' || data.status === 'new') {
      questions = (data.questions || []).map(function(q) { return q; });
      if (!questions.length) { app.innerHTML = '<div class="card text-center"><p>题库加载失败，请联系管理员</p></div>'; return; }
      renderRegister();
    } else {
      app.innerHTML = '<div class="card text-center"><p>加载失败，请刷新重试</p></div>';
    }
  } catch(e) {
    app.innerHTML = '<div class="card text-center"><p>网络错误，请检查连接后刷新</p></div>';
  }
}

// ====== 注册页 ======
function renderRegister() {
  app.innerHTML =
    '<div class="card">'+
      '<h2 style="text-align:center">精益知识有奖问答</h2>'+
      '<p class="text-sm text-muted text-center mb-3">请填写信息后开始答题</p>'+
      '<div class="form-g"><label>姓名</label><input type="text" id="regName" placeholder="请输入真实姓名" maxlength="20" autocomplete="off"></div>'+
      '<div class="form-g"><label>工号</label><input type="text" id="regEid" placeholder="请输入工号" maxlength="30" autocomplete="off"></div>'+
      '<div class="card" style="background:#f8fafc">'+
        '<p class="text-sm" style="font-weight:600">活动规则</p>'+
        '<ul class="rules">'+
          '<li>随机出题 <b>10题</b>（单选'+C.S_CNT+'+多选'+C.M_CNT+'+判断'+C.J_CNT+'）</li>'+
          '<li>每题10分，满分<b>100分</b></li>'+
          '<li>得分<b>≥'+C.PASS_SCORE+'分</b>可现场领奖1次</li>'+
          '<li>每人仅限参与<b>1次</b></li>'+
        '</ul>'+
      '</div>'+
      '<button class="btn btn-pri mt-3" id="btnGo">确认并开始答题</button>'+
    '</div>';

  document.getElementById('btnGo').onclick = function() {
    var name = document.getElementById('regName').value.trim();
    var eid = document.getElementById('regEid').value.trim();
    if (!name) return toast('请输入姓名', 'warn');
    if (!eid) return toast('请输入工号', 'warn');
    window._user = { name: name, eid: eid };
    answers = {};
    renderQuiz(0);
  };
}

// ====== 答题页 ======
function renderQuiz(idx) {
  var total = questions.length;
  if (idx >= total) { submit(); return; }
  var q = questions[idx];
  var type = q.type, isLast = idx === total - 1;
  var isCheck = type === 'multiple';
  var badge = type === 'single' ? '单选题' : type === 'multiple' ? '多选题' : '判断题';
  var badgeCls = type === 'single' ? 'badge-a' : type === 'multiple' ? 'badge-b' : 'badge-c';
  var opts = type === 'judge' ? [{key:'A',text:'正确'},{key:'B',text:'错误'}] : (q.options || []);
  var sel = answers[idx] || [];

  var optHtml = '';
  opts.forEach(function(o) {
    var l = o.key, on = sel.indexOf(l) !== -1;
    var ind = isCheck ? '<div class="opt-check">'+(on?'✓':'')+'</div>' : '<div class="opt-check" style="border-radius:50%">'+(on?'●':'')+'</div>';
    optHtml += '<div class="opt'+(on?' sel':'')+'" data-l="'+l+'"><span class="opt-letter">'+l+'.</span>'+ind+'<span class="opt-text">'+o.text+'</span></div>';
  });

  app.innerHTML =
    '<div class="card">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+Math.round((idx+1)/total*100)+'%"></div></div>'+
      '<p class="progress-txt">第 '+(idx+1)+'/'+total+' 题</p>'+
      '<span class="q-badge '+badgeCls+'">'+badge+'</span>'+
      '<div class="q-text">'+(idx+1)+'. '+q.text+'</div>'+
      (isCheck ? '<p class="text-xs" style="color:#d97706;margin-bottom:8px">多选：可选择多个答案</p>' : '')+
      '<div class="opt-list" id="optList">'+optHtml+'</div>'+
      '<div class="nav-row">'+
        (idx===0?'<span></span>':'<button class="btn btn-out btn-sm" id="btnPrev">上一题</button>')+
        '<button class="btn btn-pri btn-sm" style="width:auto;padding:8px 28px" id="btnNext">'+(isLast?'提交答卷':'下一题')+'</button>'+
      '</div>'+
    '</div>';

  document.getElementById('optList').onclick = function(e) {
    var el = e.target.closest('.opt'); if (!el) return;
    var l = el.dataset.l, cur = answers[idx] || [];
    if (isCheck) {
      if (cur.indexOf(l) !== -1) cur = cur.filter(function(x) { return x !== l; });
      else { cur = cur.concat([l]); cur.sort(); }
    } else { cur = [l]; }
    answers[idx] = cur;
    document.querySelectorAll('.opt').forEach(function(o) {
      var dl = o.dataset.l, on = cur.indexOf(dl) !== -1;
      o.classList.toggle('sel', on);
      var ck = o.querySelector('.opt-check');
      if (ck) { if (isCheck) ck.textContent = on ? '✓' : ''; else ck.textContent = on ? '●' : ''; }
    });
  };

  var btnPrev = document.getElementById('btnPrev');
  if (btnPrev) btnPrev.onclick = function() { renderQuiz(idx - 1); };
  document.getElementById('btnNext').onclick = function() {
    if ((answers[idx] || []).length === 0) return toast('请选择答案', 'warn');
    if (isLast) submit();
    else renderQuiz(idx + 1);
  };
}

// ====== 提交 ======
async function submit() {
  var ansArr = questions.map(function(q, i) {
    var u = (answers[i] || []).sort().join('');
    if (q.type === 'judge') { u = u === 'A' ? '正确' : (u === 'B' ? '错误' : u); }
    return { questionId: q.id, userAnswer: u };
  });
  var user = window._user || {};
  try {
    var res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: ansArr, name: user.name, employee_id: user.eid })
    });
    var result = await res.json();
    if (result.status === 'success') {
      showResult(result);
    } else if (result.status === 'already') {
      toast('您已经参加过答题', 'warn');
      showScore(result.score);
    } else {
      toast(result.error || '提交失败', 'err');
    }
  } catch(e) {
    toast('网络错误，提交失败', 'err');
  }
}

// ====== 结果页 ======
function showResult(data) {
  var score = data.score, passed = score >= C.PASS_SCORE;
  var user = window._user || {};
  app.innerHTML =
    '<div class="card text-center">'+
      '<p class="text-muted text-sm">'+user.name+' 的得分</p>'+
      '<div class="r-score '+(passed?'good':'bad')+'">'+score+'</div>'+
      '<p style="font-weight:600">满分100分 | 及格线'+C.PASS_SCORE+'分</p>'+
      '<div class="card" style="background:'+(passed?'#d1fae5':'#fee2e2')+'">'+
        '<p style="font-weight:600">'+(passed?'成绩合格，请前往领奖处领取奖品！':'未达到领奖线，继续加油！')+'</p>'+
        (passed?'<p class="text-sm text-muted">出示此页面给工作人员登记领奖</p>':'')+
      '</div>'+
      '<button class="btn btn-out btn-sm mt-3" onclick="location.reload()">返回首页</button>'+
    '</div>';
}

function showScore(score) {
  var passed = score >= C.PASS_SCORE;
  app.innerHTML =
    '<div class="card text-center">'+
      '<p class="text-muted text-sm">您的得分</p>'+
      '<div class="r-score '+(passed?'good':'bad')+'">'+score+'</div>'+
      '<p style="font-weight:600">满分100分 | 及格线'+C.PASS_SCORE+'分</p>'+
      '<div class="card" style="background:'+(passed?'#d1fae5':'#fee2e2')+'">'+
        '<p style="font-weight:600">'+(passed?'恭喜！已合格，请前往领奖处领奖！':'未达到领奖线，继续加油！')+'</p>'+
      '</div>'+
      '<p class="text-xs text-muted mt-3">每人仅限参与1次</p>'+
    '</div>';
}

load();
</script>
</body>
</html>
